name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update.
        required: true
        default: v0.1.0-alpha.1

permissions:
  contents: write

concurrency:
  group: release-packages-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  GH_TOKEN: ${{ github.token }}

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release tag exists
        run: |
          set -euo pipefail
          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          CCVar Quant Lab release assets:

          - `ccvar-quant-lab-macos-native.zip`: standalone macOS WKWebView client plus browser launcher app.
          - `ccvar-quant-lab-windows-native.zip`: standalone Windows WebView2 client plus browser launcher command.
          - `ccvar-quant-lab-macos-arm64.zip`: portable macOS browser-launcher package.
          - `ccvar-quant-lab-windows-amd64.zip`: portable Windows browser-launcher package.
          - `SHA256SUMS.*.txt` and `release-manifest.json`: verification material.

          中文说明：

          - macOS/Windows 原生包是完整客户端，不需要手动打开浏览器。
          - 浏览器启动包会启动本地服务并打开 Web UI。
          - 当前版本禁用 production/mainnet 真实交易，只允许模拟、纸面、测试网/demo 的受控验收路径。
          EOF

      - name: Create or update release shell
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "CCVar Quant Lab ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --target "${GITHUB_SHA}"
          else
            gh release create "${RELEASE_TAG}" \
              --title "CCVar Quant Lab ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --target "${GITHUB_SHA}"
          fi

  browser-launcher-packages:
    name: Browser Launcher Packages
    runs-on: ubuntu-latest
    needs: prepare-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install -y file ripgrep unzip zip

      - name: Install npm dependencies
        run: npm ci

      - name: Verify browser-launcher packages
        run: npm run verify:release

      - name: Publish browser-launcher packages
        run: |
          set -euo pipefail
          cp dist/desktop/SHA256SUMS.txt dist/desktop/SHA256SUMS.desktop.txt
          gh release upload "${RELEASE_TAG}" \
            dist/desktop/ccvar-quant-lab-macos-arm64.zip \
            dist/desktop/ccvar-quant-lab-windows-amd64.zip \
            dist/desktop/release-manifest.json \
            dist/desktop/SHA256SUMS.desktop.txt \
            --clobber

  native-macos:
    name: Native macOS Package
    runs-on: macos-latest
    needs: prepare-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Package native macOS client
        run: npm run package:native:macos

      - name: Verify native macOS package
        run: |
          set -euo pipefail
          test -s "dist/native/macos/ccvar-quant-lab-macos-native.zip"
          test -s "dist/native/macos/SHA256SUMS.txt"
          cd "dist/native/macos"
          shasum -a 256 -c "SHA256SUMS.txt"

      - name: Publish native macOS package
        run: |
          set -euo pipefail
          cp dist/native/macos/SHA256SUMS.txt dist/native/macos/SHA256SUMS.native-macos.txt
          gh release upload "${RELEASE_TAG}" \
            dist/native/macos/ccvar-quant-lab-macos-native.zip \
            dist/native/macos/SHA256SUMS.native-macos.txt \
            --clobber

  native-windows:
    name: Native Windows Package
    runs-on: windows-latest
    needs: prepare-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install npm dependencies
        run: npm ci

      - name: Package native Windows client
        shell: pwsh
        run: npm run package:native:windows

      - name: Verify native Windows package
        shell: pwsh
        run: |
          if (!(Test-Path "dist/native/windows/ccvar-quant-lab-windows-native.zip")) { throw "missing native Windows zip" }
          if (!(Test-Path "dist/native/windows/SHA256SUMS.txt")) { throw "missing SHA256SUMS" }
          $hash = (Get-FileHash -Algorithm SHA256 "dist/native/windows/ccvar-quant-lab-windows-native.zip").Hash.ToLowerInvariant()
          $expected = (Get-Content "dist/native/windows/SHA256SUMS.txt").Split(" ")[0]
          if ($hash -ne $expected) { throw "native Windows zip checksum mismatch" }

      - name: Publish native Windows package
        shell: pwsh
        run: |
          Copy-Item "dist/native/windows/SHA256SUMS.txt" "dist/native/windows/SHA256SUMS.native-windows.txt"
          gh release upload "$env:RELEASE_TAG" `
            "dist/native/windows/ccvar-quant-lab-windows-native.zip" `
            "dist/native/windows/SHA256SUMS.native-windows.txt" `
            --clobber
