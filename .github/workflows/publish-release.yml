name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update.
        required: true
        default: v0.1.0-alpha.1

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  desktop-release:
    name: Browser Launcher Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install -y file ripgrep unzip zip

      - name: Install npm dependencies
        run: npm ci

      - name: Verify browser-launcher packages
        run: npm run verify:release

      - name: Upload browser-launcher packages
        uses: actions/upload-artifact@v4
        with:
          name: ccvar-desktop-release
          path: |
            dist/desktop/ccvar-quant-lab-macos-arm64.zip
            dist/desktop/ccvar-quant-lab-windows-amd64.zip
            dist/desktop/SHA256SUMS.txt
            dist/desktop/release-manifest.json
          if-no-files-found: error
          retention-days: 14

  native-macos:
    name: Native macOS Package
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Package native macOS client
        run: npm run package:native:macos

      - name: Verify native macOS package
        run: |
          test -s "dist/native/macos/ccvar-quant-lab-macos-native.zip"
          test -s "dist/native/macos/SHA256SUMS.txt"
          cd "dist/native/macos"
          shasum -a 256 -c "SHA256SUMS.txt"

      - name: Upload native macOS package
        uses: actions/upload-artifact@v4
        with:
          name: ccvar-native-macos
          path: |
            dist/native/macos/ccvar-quant-lab-macos-native.zip
            dist/native/macos/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

  native-windows:
    name: Native Windows Package
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install npm dependencies
        run: npm ci

      - name: Package native Windows client
        shell: pwsh
        run: npm run package:native:windows

      - name: Verify native Windows package
        shell: pwsh
        run: |
          if (!(Test-Path "dist/native/windows/ccvar-quant-lab-windows-native.zip")) { throw "missing native Windows zip" }
          if (!(Test-Path "dist/native/windows/SHA256SUMS.txt")) { throw "missing SHA256SUMS" }
          $hash = (Get-FileHash -Algorithm SHA256 "dist/native/windows/ccvar-quant-lab-windows-native.zip").Hash.ToLowerInvariant()
          $expected = (Get-Content "dist/native/windows/SHA256SUMS.txt").Split(" ")[0]
          if ($hash -ne $expected) { throw "native Windows zip checksum mismatch" }

      - name: Upload native Windows package
        uses: actions/upload-artifact@v4
        with:
          name: ccvar-native-windows
          path: |
            dist/native/windows/ccvar-quant-lab-windows-native.zip
            dist/native/windows/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - desktop-release
      - native-macos
      - native-windows
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-downloads

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p dist/release-assets
          cp dist/release-downloads/ccvar-desktop-release/ccvar-quant-lab-macos-arm64.zip dist/release-assets/
          cp dist/release-downloads/ccvar-desktop-release/ccvar-quant-lab-windows-amd64.zip dist/release-assets/
          cp dist/release-downloads/ccvar-desktop-release/release-manifest.json dist/release-assets/
          cp dist/release-downloads/ccvar-desktop-release/SHA256SUMS.txt dist/release-assets/SHA256SUMS.desktop.txt
          cp dist/release-downloads/ccvar-native-macos/ccvar-quant-lab-macos-native.zip dist/release-assets/
          cp dist/release-downloads/ccvar-native-macos/SHA256SUMS.txt dist/release-assets/SHA256SUMS.native-macos.txt
          cp dist/release-downloads/ccvar-native-windows/ccvar-quant-lab-windows-native.zip dist/release-assets/
          cp dist/release-downloads/ccvar-native-windows/SHA256SUMS.txt dist/release-assets/SHA256SUMS.native-windows.txt
          ls -lh dist/release-assets

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          CCVar Quant Lab release assets:

          - `ccvar-quant-lab-macos-native.zip`: standalone macOS WKWebView client plus browser launcher app.
          - `ccvar-quant-lab-windows-native.zip`: standalone Windows WebView2 client plus browser launcher command.
          - `ccvar-quant-lab-macos-arm64.zip`: portable macOS browser-launcher package.
          - `ccvar-quant-lab-windows-amd64.zip`: portable Windows browser-launcher package.
          - `SHA256SUMS.*.txt` and `release-manifest.json`: verification material.

          中文说明：

          - macOS/Windows 原生包是完整客户端，不需要手动打开浏览器。
          - 浏览器启动包会启动本地服务并打开 Web UI。
          - 当前版本禁用 production/mainnet 真实交易，只允许模拟、纸面、测试网/demo 的受控验收路径。
          EOF

      - name: Publish release
        run: |
          set -euo pipefail
          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/release-assets/* --clobber
          else
            gh release create "${RELEASE_TAG}" dist/release-assets/* \
              --title "CCVar Quant Lab ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --target "${GITHUB_SHA}"
          fi
