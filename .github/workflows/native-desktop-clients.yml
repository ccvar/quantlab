name: Native Desktop Clients

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-desktop-clients-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-macos:
    name: Native macOS Client
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Package native macOS client
        run: npm run package:native:macos

      - name: Verify native macOS package
        run: |
          test -s "dist/native/macos/ccvar-quant-lab-macos-native.zip"
          test -s "dist/native/macos/SHA256SUMS.txt"
          shasum -a 256 -c "dist/native/macos/SHA256SUMS.txt"
          plutil -lint "dist/native/macos/CCVar Quant Lab.app/Contents/Info.plist"
          file "dist/native/macos/CCVar Quant Lab.app/Contents/MacOS/CCVar Quant Lab" | grep "Mach-O universal binary"
          file "dist/native/macos/CCVar Quant Lab.app/Contents/MacOS/ccvar-quant" | grep "Mach-O universal binary"
          unzip -l "dist/native/macos/ccvar-quant-lab-macos-native.zip" | grep "CCVar Quant Lab.app/Contents/MacOS/CCVar Quant Lab"
          unzip -l "dist/native/macos/ccvar-quant-lab-macos-native.zip" | grep "CCVar Quant Lab Web.app/Contents/MacOS/CCVar Quant Lab Web"

      - name: Upload native macOS package
        uses: actions/upload-artifact@v4
        with:
          name: ccvar-native-macos
          path: |
            dist/native/macos/ccvar-quant-lab-macos-native.zip
            dist/native/macos/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

  native-windows:
    name: Native Windows Client
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install npm dependencies
        run: npm ci

      - name: Package native Windows client
        shell: pwsh
        run: npm run package:native:windows

      - name: Verify native Windows package
        shell: pwsh
        run: |
          if (!(Test-Path "dist/native/windows/ccvar-quant-lab-windows-native.zip")) { throw "missing native Windows zip" }
          if (!(Test-Path "dist/native/windows/SHA256SUMS.txt")) { throw "missing SHA256SUMS" }
          $hash = (Get-FileHash -Algorithm SHA256 "dist/native/windows/ccvar-quant-lab-windows-native.zip").Hash.ToLowerInvariant()
          $expected = (Get-Content "dist/native/windows/SHA256SUMS.txt").Split(" ")[0]
          if ($hash -ne $expected) { throw "native Windows zip checksum mismatch" }
          Expand-Archive -Path "dist/native/windows/ccvar-quant-lab-windows-native.zip" -DestinationPath "$env:RUNNER_TEMP\native-windows" -Force
          foreach ($file in @(
            "CCVar Quant Lab.exe",
            "ccvar-quant.exe",
            "Start CCVar Quant Lab Web.cmd",
            "README.txt",
            "docs/operator-runbook.zh-CN.md",
            "docs/safety.md"
          )) {
            if (!(Test-Path (Join-Path "$env:RUNNER_TEMP\native-windows" $file))) { throw "missing $file" }
          }

      - name: Upload native Windows package
        uses: actions/upload-artifact@v4
        with:
          name: ccvar-native-windows
          path: |
            dist/native/windows/ccvar-quant-lab-windows-native.zip
            dist/native/windows/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
